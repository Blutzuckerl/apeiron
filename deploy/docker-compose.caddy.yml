services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    env_file:
      - ../.env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      HTTP_PORT: 3000
      HTTPS_ENABLED: 0
      TRUST_PROXY: 1
      FORCE_HTTPS: 1
      HTTPS_REDIRECT_PORT: 443
      LAN_PUBLIC_HTTPS_URL: ${LAN_PUBLIC_HTTPS_URL:-}
      VOICE_REQUIRE_SECURE_ORIGIN: 1
      VOICE_REQUIRE_TURN: ${VOICE_REQUIRE_TURN:-1}
      TURN_URLS: ${TURN_URLS:-}
      TURN_USER: ${TURN_USER:-}
      TURN_PASS: ${TURN_PASS:-}
    expose:
      - "3000"
    volumes:
      - ../:/app
      - app_node_modules:/app/node_modules
      - ../data:/app/data
    command: sh -c "npm run db:migrate && npm run dev"

  caddy:
    image: caddy:2.8
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      APEIRON_DOMAIN: ${APEIRON_DOMAIN:-}
      DNS_PROVIDER: ${DNS_PROVIDER:-}
      DNS_API_TOKEN: ${DNS_API_TOKEN:-}
    volumes:
      - ./caddy/Caddyfile.letsencrypt.template:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_node_modules:
  caddy_data:
  caddy_config:
